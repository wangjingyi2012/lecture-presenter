name: Build Windows

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: lecture-app/src-tauri

      - name: Install frontend dependencies
        working-directory: lecture-app
        run: npm install

      - name: Build Tauri app (Windows)
        working-directory: lecture-app
        run: npm run build:release
        env:
          TAURI_SIGNING_PRIVATE_KEY: ""

      - name: Upload NSIS installer
        uses: actions/upload-artifact@v4
        with:
          name: LecturePresenter-Windows-NSIS
          path: lecture-app/src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: warn
