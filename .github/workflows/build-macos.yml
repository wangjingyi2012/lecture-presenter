name: Build macOS

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build-macos:
    name: Build macOS ${{ matrix.label }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: Apple Silicon
            runner: macos-14
            target: aarch64-apple-darwin
            arch: aarch64
          - label: Intel
            runner: macos-15-intel
            target: x86_64-apple-darwin
            arch: x64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: lecture-app/src-tauri

      - name: Install dependencies
        working-directory: lecture-app
        run: npm ci

      - name: Build Tauri app
        working-directory: lecture-app
        run: npm run build:release -- ${{ matrix.target }}

      - name: Prepare release asset
        working-directory: lecture-app
        run: |
          set -euo pipefail
          VERSION="$(node -p "require('./package.json').version")"
          mkdir -p release
          DMG="$(find src-tauri/target -path '*/release/bundle/dmg/*.dmg' -type f | head -n 1)"
          if [ -z "$DMG" ]; then
            echo "No DMG found"
            exit 1
          fi
          cp "$DMG" "release/Lecture-Presenter_${VERSION}_macOS_${{ matrix.arch }}.dmg"

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: LecturePresenter-macOS-${{ matrix.arch }}-DMG
          path: lecture-app/release/*.dmg
          if-no-files-found: error

  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build-macos
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - name: Download DMG artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Create or update release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release upload "$TAG_NAME" release-assets/*.dmg --clobber
          else
            gh release create "$TAG_NAME" release-assets/*.dmg \
              --title "$TAG_NAME" \
              --generate-notes
          fi
