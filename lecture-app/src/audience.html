<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>观众窗口</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: #000;
    }
    #slide-frame {
      position: absolute;
      inset: 0;
      width: 100vw;
      height: 100vh;
      border: none;
      display: block;
    }
    #nav-layer {
      position: absolute;
      inset: 0;
      z-index: 2;
      background: transparent;
      cursor: default;
      outline: none;
    }
  </style>
</head>
<body>
  <iframe id="slide-frame" sandbox="allow-same-origin allow-scripts allow-popups allow-popups-to-escape-sandbox allow-top-navigation-by-user-activation allow-forms"></iframe>
  <div id="nav-layer" tabindex="0" aria-label="幻灯片导航层"></div>
  <script>
    const { listen, emit } = window.__TAURI__.event;
    let currentSlideUrl = '';

    // Listen for slide-change events from the presenter window
    listen('slide-change', (event) => {
      const slideUrl = event.payload;
      if (slideUrl) {
        currentSlideUrl = slideUrl;
        document.getElementById('slide-frame').src = slideUrl;
        document.getElementById('nav-layer').focus();
      }
    });

    window.addEventListener('message', async (event) => {
      const frame = document.getElementById('slide-frame');
      const data = event.data;
      if (event.source !== frame.contentWindow) return;
      if (data && data.type === 'slide-navigate') {
        await emit('audience-navigate', data.direction || data.action || 'next');
        return;
      }
      if (!data || (data.type !== 'open-file' && data.type !== 'open-resource')) return;

      if (data.url) {
        const url = String(data.url).trim();
        if (/^https?:\/\//i.test(url)) {
          await window.__TAURI__.core.invoke('open_external', { path: url });
        }
        return;
      }

      if (!data.path) return;
      const relativePath = String(data.path).replace(/\\/g, '/');
      if (relativePath.startsWith('/') || relativePath.split('/').includes('..')) return;

      const basePath = getCurrentSlideBasePath();
      if (!basePath) return;
      const filePath = `${basePath}/${relativePath}`.replace(/\\/g, '/');
      await window.__TAURI__.core.invoke('open_external', { path: filePath });
    });

    function getCurrentSlideBasePath() {
      if (!currentSlideUrl) return '';
      const url = new URL(currentSlideUrl);
      if (url.protocol !== 'slide:' && url.hostname !== 'slide.localhost') return '';
      const decodedPath = url.pathname
        .split('/')
        .map(segment => decodeURIComponent(segment))
        .join('/');
      return decodedPath.slice(0, decodedPath.lastIndexOf('/'));
    }

    function isEditableTarget(target) {
      if (!target) return false;
      const tag = target.tagName;
      return target.isContentEditable || tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT';
    }

    function handleNavigationKey(event) {
      if (isEditableTarget(event.target)) return false;
      if (event.key === 'ArrowLeft' || event.key === 'PageUp') {
        event.preventDefault();
        emit('audience-navigate', 'prev');
        return true;
      }
      if (event.key === 'ArrowRight' || event.key === 'PageDown' || event.key === ' ' || event.key === 'Spacebar' || event.key === 'Enter') {
        event.preventDefault();
        emit('audience-navigate', 'next');
        return true;
      }
      return false;
    }

    window.addEventListener('keydown', handleNavigationKey, true);
    document.getElementById('nav-layer').addEventListener('click', (event) => {
      if (event.defaultPrevented || event.button !== 0 || event.metaKey || event.ctrlKey || event.altKey || event.shiftKey) return;
      document.getElementById('nav-layer').focus();
      emit('audience-navigate', 'next');
    }, true);
  </script>
</body>
</html>
