<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PPT Content Page Demo</title>
    <link rel="stylesheet" href="content.css">
</head>
<body>
    <div class="ppt-container">
        <div class="slide">
            <!-- 页面标题 -->
            <div class="page-header">
                <h1 class="page-title">本页PPT标题</h1>
            </div>

            <!-- 内容区域 -->
            <div class="content-area">
                <!-- 这里放置具体的正文内容 -->
                <p>这里是正文内容区域。你可以在这里输入文字、列表、图片等内容。</p>
                <ul>
                    <li>列表项 1</li>
                    <li>列表项 2</li>
                    <li>列表项 3</li>
                </ul>
                <p>该区域已被限定在上下两条横线之间，超出部分会自动隐藏或显示滚动条（取决于具体需求，目前设置为隐藏以保持PPT样式）。</p>
            </div>
        </div>
    </div>
</body>
</html>
