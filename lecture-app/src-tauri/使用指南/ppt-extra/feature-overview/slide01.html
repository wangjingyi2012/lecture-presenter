<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>演讲宝 功能概览</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;700;900&display=swap');

        html, body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0c0c1d 0%, #1a1a3e 30%, #2d1b69 60%, #1a1a3e 100%);
            font-family: 'Noto Sans SC', -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif;
        }

        .slide {
            width: min(100vw, 177.78vh);
            height: min(100vh, 56.25vw);
            max-width: 100vw;
            max-height: 100vh;
            padding: 60px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        /* 装饰性背景圆 */
        .slide::before {
            content: '';
            position: absolute;
            width: 500px;
            height: 500px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(99, 102, 241, 0.15) 0%, transparent 70%);
            top: -100px;
            right: -100px;
        }

        .slide::after {
            content: '';
            position: absolute;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(168, 85, 247, 0.1) 0%, transparent 70%);
            bottom: -80px;
            left: -80px;
        }

        .logo-icon {
            font-size: 4em;
            margin-bottom: 20px;
            filter: drop-shadow(0 4px 20px rgba(99, 102, 241, 0.5));
        }

        .main-title {
            font-size: 3.5em;
            font-weight: 900;
            background: linear-gradient(135deg, #818cf8 0%, #c084fc 50%, #f472b6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin: 0 0 16px 0;
            letter-spacing: 0.08em;
            text-shadow: none;
        }

        .subtitle {
            font-size: 1.5em;
            font-weight: 300;
            color: rgba(255, 255, 255, 0.7);
            margin: 0 0 40px 0;
            letter-spacing: 0.15em;
        }

        .divider {
            width: 120px;
            height: 3px;
            background: linear-gradient(90deg, transparent, #818cf8, #c084fc, transparent);
            margin-bottom: 40px;
            border-radius: 2px;
        }

        .tagline {
            font-size: 1.2em;
            color: rgba(255, 255, 255, 0.5);
            font-weight: 300;
            letter-spacing: 0.1em;
        }

        .version {
            position: absolute;
            bottom: 40px;
            right: 60px;
            font-size: 0.9em;
            color: rgba(255, 255, 255, 0.3);
        }
    </style>
</head>
<body>
    <div class="slide">
        <div class="logo-icon">&#127891;</div>
        <h1 class="main-title">演讲宝</h1>
        <h2 class="subtitle">功 能 概 览</h2>
        <div class="divider"></div>
        <p class="tagline">Lecture Presenter &mdash; 你的智能课程管理与演示助手</p>
        <span class="version">v1.0</span>
    </div>
</body>
</html>
